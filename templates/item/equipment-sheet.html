<form class="{{#if darkMode}}dark-mode{{/if}} item-sheet" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="header-fields">
      <h1 class="charname">
        <input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'UA3E.EquipmentName'}}" />
      </h1>
    </div>
  </header>

  <div class="sheet-body">
    <div class="form-group">
      <label>{{localize 'UA3E.Quantity'}}</label>
      <input type="number" name="system.quantity" value="{{system.quantity}}" min="1" />
    </div>

    <div class="form-group">
      <label class="checkbox">
        <input type="checkbox" name="system.equipped" {{#if system.equipped}}checked{{/if}} />
        {{localize 'UA3E.Equipped'}}
      </label>
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Damage'}}</label>
      <input type="text" name="system.damage" value="{{system.damage}}" placeholder="{{localize 'UA3E.DamagePlaceholder'}}" />
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Armor'}}</label>
      <input type="number" name="system.armor" value="{{system.armor}}" min="0" />
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Description'}}</label>
      {{editor system.description target="system.description" button=true owner=owner editable=editable}}
    </div>
  </div>
</form>
