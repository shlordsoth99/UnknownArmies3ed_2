<form class="{{#if darkMode}}dark-mode{{/if}} item-sheet" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="header-fields">
      <h1 class="charname">
        <input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'UA3E.RelationshipName'}}" />
      </h1>
    </div>
  </header>

  <div class="sheet-body">
    <div class="form-group">
      <label>{{localize 'UA3E.Score'}}</label>
      <div class="form-fields">
        <input type="number" name="system.score" value="{{system.score}}" min="0" max="100" />
        <span>%</span>
      </div>
    </div>

    <div class="form-group">
      <label class="checkbox">
        <input type="checkbox" name="system.isPositive" {{#if system.isPositive}}checked{{/if}} />
        {{localize 'UA3E.PositiveRelationship'}}
      </label>
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Description'}}</label>
      {{editor system.description target="system.description" button=true owner=owner editable=editable}}
    </div>
  </div>
</form>
