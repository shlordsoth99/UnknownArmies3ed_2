<form class="{{#if darkMode}}dark-mode{{/if}} item-sheet" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="header-fields">
      <h1 class="charname">
        <input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'UA3E.TraumaName'}}" />
      </h1>
    </div>
  </header>

  <div class="sheet-body">
    <div class="form-group">
      <label>{{localize 'UA3E.Gauge'}}</label>
      <select name="system.gauge">
        {{#each gauges as |label key|}}
        <option value="{{key}}" {{#if (eq ../system.gauge key)}}selected{{/if}}>{{localize label}}</option>
        {{/each}}
      </select>
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Severity'}}</label>
      <select name="system.severity">
        <option value="1" {{#if (eq system.severity 1)}}selected{{/if}}>{{localize 'UA3E.TraumaMinor'}}</option>
        <option value="2" {{#if (eq system.severity 2)}}selected{{/if}}>{{localize 'UA3E.TraumaModerate'}}</option>
        <option value="3" {{#if (eq system.severity 3)}}selected{{/if}}>{{localize 'UA3E.TraumaSevere'}}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="checkbox">
        <input type="checkbox" name="system.isPermanent" {{#if system.isPermanent}}checked{{/if}} />
        {{localize 'UA3E.IsPermanent'}}
      </label>
    </div>

    <div class="form-group">
      <label>{{localize 'UA3E.Description'}}</label>
      {{editor system.description target="system.description" button=true owner=owner editable=editable}}
    </div>
  </div>
</form>
